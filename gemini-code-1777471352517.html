<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🛡️ Vibe Analytics V6.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090d; --surface: #0f1117; --border: rgba(255,255,255,0.08);
      --text: #f0f0f0; --muted: rgba(255,255,255,0.38);
      --accent: #ff5c1a; --accent2: #e91e8c; --green: #00e676; --yellow: #ffd600;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'Noto Sans JP', sans-serif; --font-mono: 'Space Mono', monospace;
      --radius: 14px; --radius-sm: 9px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }
    body { background-image: radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,92,26,0.10) 0%, transparent 55%); min-height: 100vh; }
    #root { max-width: 540px; margin: 0 auto; padding: 0 0 100px; }
    .header { position: sticky; top: 0; z-index: 200; background: rgba(8,9,13,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-title { font-family: var(--font-head); font-size: 22px; letter-spacing: 0.04em; }
    .section { padding: 20px 16px 0; }
    .section-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .set-card { background: rgba(255,255,255,0.025); border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .set-header { padding: 15px 16px; display: flex; align-items: center; justify-content: space-between; }
    .set-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .field-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: #fff; font-size: 15px; }
    input:focus { border-color: var(--accent); outline: none; }
    .stamp-btn { background: var(--accent); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 900; border: none; cursor: pointer; }
    .stamp-btn.secondary { background: rgba(255,255,255,0.15); }
    .platform-block { border-radius: 11px; padding: 12px; margin-top: 10px; border: 1px solid var(--border); }
    .platform-title { font-size: 12px; font-weight: 900; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .diff-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(0,230,118,0.15); color: var(--green); }
    .add-btn { width: 100%; padding: 18px; background: rgba(255,255,255,0.04); border: 2px dashed var(--border); color: #fff; font-weight: bold; border-radius: var(--radius); margin-top: 10px; }
    .gen-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: var(--radius); color: #fff; font-size: 17px; font-weight: 900; margin-top: 30px; border:none; }
    .log-box { background: #000; border: 1px solid var(--border); border-radius: var(--radius); margin-top: 15px; padding: 15px; font-family: var(--font-mono); font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

const PLATFORMS = [
  { key: 'd', label: '出前館', color: '#ff5c1a' },
  { key: 'u', label: 'Uber',   color: '#06C167' },
  { key: 'm', label: 'menu',   color: '#e91e8c' },
];

function getNow() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function App() {
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
  const [weather, setWeather] = useState('晴');
  const [sets, setSets] = useState([{ 
    start: '', end: '', 
    d_cum: '', u_cum: '', m_cum: '', 
    d_cnt_cum: '', u_cnt_cum: '', m_cnt_cum: '',
    km: '', memo: '', quest: '' 
  }]);
  const [showLog, setShowLog] = useState(false);

  // 差分計算
  const calculatedSets = useMemo(() => {
    return sets.map((s, i) => {
      const prev = sets[i-1] || { d_cum:0, u_cum:0, m_cum:0, d_cnt_cum:0, u_cnt_cum:0, m_cnt_cum:0 };
      const n = (v) => parseFloat(v) || 0;
      return { 
        ...s, 
        d_p: n(s.d_cum) - n(prev.d_cum), 
        u_p: n(s.u_cum) - n(prev.u_cum), 
        m_p: n(s.m_cum) - n(prev.m_cum),
        d_c: n(s.d_cnt_cum) - n(prev.d_cnt_cum),
        u_c: n(s.u_cnt_cum) - n(prev.u_cnt_cum),
        m_c: n(s.m_cnt_cum) - n(prev.m_cnt_cum)
      };
    });
  }, [sets]);

  const updateSet = (i, key, val) => {
    const newSets = [...sets];
    newSets[i][key] = val;
    setSets(newSets);
  };

  const addSet = () => {
    setSets([...sets, { 
      start: '', end: '', 
      d_cum: sets[sets.length-1].d_cum, u_cum: sets[sets.length-1].u_cum, m_cum: sets[sets.length-1].m_cum, 
      d_cnt_cum: sets[sets.length-1].d_cnt_cum, u_cnt_cum: sets[sets.length-1].u_cnt_cum, m_cnt_cum: sets[sets.length-1].m_cnt_cum,
      km: '', memo: '', quest: '' 
    }]);
  };

  return (
    <div>
      <div className="header">
        <div className="header-logo">🛡️</div>
        <div>
          <div className="header-title">VIBE ANALYTICS V6.1</div>
          <div className="header-sub">NO MORE MEMORY / 差分自動計算</div>
        </div>
      </div>

      <div className="section">
        <div className="input-row">
          <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          <input type="text" value={weather} onChange={e => setWeather(e.target.value)} />
        </div>
      </div>

      <div className="section">
        <div className="section-label">稼働セット</div>
        {calculatedSets.map((s, i) => (
          <div key={i} className="set-card">
            <div className="set-header">
              <span style={{fontWeight:'900'}}>SET {i+1}</span>
              {s.start && !s.end && <span style={{fontSize:'10px', color:var(--accent)}}>● 稼働中...</span>}
            </div>
            <div className="set-body">
              <div className="input-row">
                <div>
                  <label className="field-label">開始</label>
                  <div style={{display:'flex', gap:'5px'}}>
                    <input type="time" value={s.start} onChange={e=>updateSet(i,'start',e.target.value)} />
                    <button className="stamp-btn" onClick={()=>updateSet(i,'start',getNow())}>START</button>
                  </div>
                </div>
                <div>
                  <label className="field-label">終了</label>
                  <div style={{display:'flex', gap:'5px'}}>
                    <input type="time" value={s.end} onChange={e=>updateSet(i,'end',e.target.value)} />
                    <button className="stamp-btn secondary" onClick={()=>updateSet(i,'end',getNow())}>FIN</button>
                  </div>
                </div>
              </div>

              {PLATFORMS.map(p => (
                <div key={p.key} className="platform-block" style={{background: p.color+'08'}}>
                  <div className="platform-title" style={{color:p.color}}>
                    {p.label} <span className="diff-badge">+{s[p.key+'_p'].toLocaleString()}円 / {s[p.key+'_c']}件</span>
                  </div>
                  <div className="input-row">
                    <input type="number" placeholder="総売上(累積)" value={sets[i][p.key+'_cum']} onChange={e=>updateSet(i, p.key+'_cum', e.target.value)} />
                    <input type="number" placeholder="総件数(累積)" value={sets[i][p.key+'_cnt_cum']} onChange={e=>updateSet(i, p.key+'_cnt_cum', e.target.value)} />
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
        <button className="add-btn" onClick={addSet}>+ 次のセットを追加 (休憩後など)</button>
      </div>

      <div className="section">
        <button className="gen-btn" onClick={() => setShowLog(!showLog)}>ログを生成</button>
        {showLog && (
          <div className="log-box">
             {/* ログ生成ロジックはV5形式を維持 */}
             BOSS、お疲れ様です。各セットの売上・件数は、上の入力値に基づいて自動計算されています。
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
