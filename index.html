<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🛡️ Delivery Vibe Analytics</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08090d;
      --surface:   #0f1117;
      --border:    rgba(255,255,255,0.08);
      --text:      #f0f0f0;
      --muted:     rgba(255,255,255,0.38);
      --accent:    #ff5c1a;
      --accent2:   #e91e8c;
      --green:     #00e676;
      --yellow:    #ffd600;
      --uber:      #06C167;
      --demae:     #ff5c1a;
      --menu:      #e91e8c;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Noto Sans JP', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --radius:    14px;
      --radius-sm: 9px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }

    body {
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,92,26,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 85% 85%, rgba(233,30,140,0.08) 0%, transparent 55%);
      min-height: 100vh;
    }

    #root { max-width: 540px; margin: 0 auto; padding: 0 0 100px; }

    /* ---------- Scrollbar ---------- */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* ---------- Inputs ---------- */
    input, textarea, select {
      font-family: var(--font-body);
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(255,92,26,0.55);
      box-shadow: 0 0 0 3px rgba(255,92,26,0.12);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="date"], input[type="time"] { color-scheme: dark; }
    textarea { resize: vertical; line-height: 1.5; }

    /* ---------- Buttons ---------- */
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; transition: transform 0.1s, opacity 0.15s; }
    button:active { transform: scale(0.96); }

    /* ---------- Sticky header ---------- */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(8,9,13,0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .header-logo {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 4px 14px rgba(255,92,26,0.35);
    }
    .header-title { font-family: var(--font-head); font-size: 22px; letter-spacing: 0.04em; line-height: 1; }
    .header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin-top: 2px; }

    /* ---------- Section ---------- */
    .section { padding: 20px 16px 0; }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    /* ---------- Summary cards ---------- */
    .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-card {
      background: rgba(255,255,255,0.035);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 12px 13px;
    }
    .stat-card-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
    .stat-card-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; line-height: 1.1; }
    .stat-card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .platform-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 8px; }
    .platform-card {
      border-radius: 11px; padding: 11px 12px;
    }
    .platform-card-label { font-size: 10px; font-weight: 900; letter-spacing: 0.05em; margin-bottom: 5px; }
    .platform-card-price { font-family: var(--font-mono); font-size: 15px; font-weight: 700; }
    .platform-card-count { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ---------- Set accordion ---------- */
    .set-card {
      background: rgba(255,255,255,0.025);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    }
    .set-header {
      padding: 15px 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
      min-height: 64px;
    }
    .set-header:active { background: rgba(255,255,255,0.04); }
    .set-badge {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(255,92,26,0.25), rgba(233,30,140,0.25));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--accent);
    }
    .set-header-info { flex: 1; min-width: 0; }
    .set-header-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .set-header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .set-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .del-btn {
      background: rgba(255,60,60,0.1); border: 1.5px solid rgba(255,60,60,0.2);
      border-radius: 7px; color: rgba(255,110,110,0.8);
      padding: 5px 10px; font-size: 12px; font-weight: 700;
      min-width: 40px; min-height: 32px;
    }
    .chevron { font-size: 12px; color: var(--muted); }

    .set-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }

    /* ---------- Form rows ---------- */
    .field-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .full-input { width: 100%; padding: 12px 13px; }

    .platform-block {
      border-radius: 11px; padding: 13px; margin-top: 10px;
    }
    .platform-block-label { font-size: 12px; font-weight: 900; letter-spacing: 0.04em; margin-bottom: 9px; }

    /* ---------- Weather / Quest row ---------- */
    .env-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .weather-btns { display: flex; gap: 6px; }
    .weather-btn {
      flex: 1; padding: 11px 4px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted); font-size: 17px;
      min-height: 48px; transition: all 0.15s;
    }
    .weather-btn.active {
      border-color: rgba(255,92,26,0.55);
      background: rgba(255,92,26,0.12);
    }
    .quest-btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted); font-size: 15px; font-weight: 700;
      min-height: 48px; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all 0.15s;
    }
    .quest-btn.active {
      border-color: rgba(255,214,0,0.45);
      background: rgba(255,214,0,0.09);
      color: var(--yellow);
    }

    /* ---------- Add set button ---------- */
    .add-set-btn {
      width: 100%; padding: 16px; border-radius: var(--radius);
      background: rgba(255,255,255,0.04);
      border: 1.5px dashed rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 700;
      min-height: 56px; letter-spacing: 0.02em;
      transition: all 0.2s;
    }
    .add-set-btn:active { background: rgba(255,92,26,0.08); border-color: rgba(255,92,26,0.3); color: var(--accent); }

    /* ---------- Generate / copy ---------- */
    .gen-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: var(--radius); color: #fff;
      font-size: 17px; font-weight: 900; letter-spacing: 0.04em;
      min-height: 60px; box-shadow: 0 6px 24px rgba(255,92,26,0.30);
      transition: opacity 0.15s, transform 0.1s;
    }
    .gen-btn.open {
      background: rgba(255,92,26,0.1);
      border: 1.5px solid rgba(255,92,26,0.3);
      color: var(--accent); box-shadow: none;
    }

    .log-box {
      background: rgba(0,0,0,0.45);
      border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-top: 10px;
    }
    .log-topbar {
      padding: 11px 15px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .log-topbar-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
    .copy-btn {
      padding: 7px 16px; border-radius: 7px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff; font-size: 13px; font-weight: 700;
      min-height: 36px; min-width: 80px;
      transition: all 0.2s;
    }
    .copy-btn.copied {
      border-color: rgba(0,230,118,0.4);
      background: rgba(0,230,118,0.1);
      color: var(--green);
    }
    .log-pre {
      padding: 15px; font-family: var(--font-mono); font-size: 11.5px;
      line-height: 1.75; color: rgba(255,255,255,0.72);
      white-space: pre-wrap; word-break: break-all;
      max-height: 420px; overflow-y: auto;
    }

    /* ---------- Divider ---------- */
    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    /* ---------- Animations ---------- */
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.22s ease forwards; }

    @keyframes slideDown { from { opacity:0; max-height:0; } to { opacity:1; max-height:1200px; } }
    .slide-down { animation: slideDown 0.2s ease forwards; overflow: hidden; }

    /* ---------- Misc ---------- */
    .mt8  { margin-top:  8px; }
    .mt10 { margin-top: 10px; }
    .mt14 { margin-top: 14px; }
    .mt20 { margin-top: 20px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

/* =========================================================
   定数
========================================================= */
const PLATFORMS = [
  { key: 'd', label: '出前館', color: '#ff5c1a' },
  { key: 'u', label: 'Uber',   color: '#06C167' },
  { key: 'm', label: 'menu',   color: '#e91e8c' },
];
const WEATHER_LIST = [
  { label: '晴', icon: '☀️' },
  { label: '曇', icon: '☁️' },
  { label: '雨', icon: '🌧️' },
  { label: '雪', icon: '❄️' },
];
const DAYS_JA = ['日','月','火','水','木','金','土'];

/* =========================================================
   ユーティリティ  ※ ロジック1ミリも変えない
========================================================= */
// AM4時ルールに基づくデフォルト日付
function getDefaultDate() {
  const now = new Date();
  if (now.getHours() < 4) {
    const y = new Date(now);
    y.setDate(y.getDate() - 1);
    return y.toISOString().split('T')[0];
  }
  return now.toISOString().split('T')[0];
}

function getDayJa(dateStr) {
  return DAYS_JA[new Date(dateStr).getDay()];
}

function parseMin(str) {
  if (!str || !str.includes(':')) return null;
  const [h, m] = str.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}

function calcHours(start, end) {
  const s = parseMin(start), e = parseMin(end);
  if (s === null || e === null) return 0;
  let diff = e - s;
  if (diff < 0) diff += 1440;
  return diff / 60;
}

const n = v => parseFloat(v) || 0;
const fmt = v => Math.round(v).toLocaleString();
const fmtDec = (v, d) => (Math.round(v * 10**d) / 10**d).toLocaleString();

/* =========================================================
   新規セット
========================================================= */
function newSet() {
  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  return { start: t, end: t, d_price:'', d_count:'', u_price:'', u_count:'', m_price:'', m_count:'', quest:'', km:'', memo:'' };
}

/* =========================================================
   ログ生成  ※ マニュアルV5フォーマット完全再現
========================================================= */
function generateLog({ date, weather, isQuest, sets }) {
  const dayOfWeek = getDayJa(date);
  const dateStr = date.replace(/-/g, '/');
  const weatherStr = `${weather}・${isQuest ? 'クエあり' : 'クエストなし'}`;

  // 集計
  let all_d_p=0, all_d_c=0, all_u_p=0, all_u_c=0, all_m_p=0, all_m_c=0;
  let all_quest=0, all_km=0, total_hours=0;
  for (const s of sets) {
    all_d_p+=n(s.d_price); all_d_c+=n(s.d_count);
    all_u_p+=n(s.u_price); all_u_c+=n(s.u_count);
    all_m_p+=n(s.m_price); all_m_c+=n(s.m_count);
    all_quest+=n(s.quest); all_km+=n(s.km);
    total_hours += calcHours(s.start, s.end);
  }
  const total_price = all_d_p + all_u_p + all_m_p + all_quest;
  const total_count = all_d_c + all_u_c + all_m_c;
  const real_price  = total_price - all_quest;
  const unit_price  = total_count > 0 ? Math.round(total_price / total_count) : 0;
  const km_unit     = all_km > 0 ? Math.round(total_price / all_km * 10) / 10 : 0;
  const hourly      = total_hours > 0 ? Math.round(total_price / total_hours) : 0;

  let log = `${dateStr} (${dayOfWeek})\n📊 本日累計リザルト\n\n`;
  log += `| 項目 | 内容 | 備考 |\n|:--|--:|:--|\n`;
  log += `| **天気** | ${weatherStr} | |\n`;
  log += `| **総売上** | **${total_price.toLocaleString()} 円** | |\n`;
  log += `| **実質売上** | **${real_price.toLocaleString()} 円** | クエスト除き |\n`;
  log += `| **クエ合計** | **${all_quest.toLocaleString()} 円** | |\n`;
  log += `| **総完了件数** | **${total_count} 件** | (D:${all_d_c} / m:${all_m_c} / U:${all_u_c}) |\n`;
  log += `| **1件単価平均** | **${unit_price.toLocaleString()} 円** | |\n`;
  log += `| **総走行距離** | **${all_km} km** | |\n`;
  log += `| **走行単価平均** | **${km_unit} 円/km** | |\n`;
  log += `| **実稼働時間** | **${Math.round(total_hours * 100) / 100} h** | |\n`;
  log += `| **時給換算** | **${hourly.toLocaleString()} 円** | |\n\n`;
  log += `🕒 各セット詳細\n`;

  for (let i = 0; i < sets.length; i++) {
    const s = sets[i];
    const h = Math.round(calcHours(s.start, s.end) * 100) / 100;
    const setTotal = n(s.d_price) + n(s.u_price) + n(s.m_price);
    const setCount = n(s.d_count) + n(s.u_count) + n(s.m_count);
    log += `第${i+1}セット ${s.start} 〜 ${s.end} (${h}h)\n`;
    log += `実績 ：${setCount}件 / ${setTotal.toLocaleString()}円 (D:${n(s.d_count)}, U:${n(s.u_count)}, m:${n(s.m_count)})\n`;
    if (s.memo) log += `戦術 ：${s.memo}\n`;
  }
  return log;
}

/* =========================================================
   コンポーネント群
========================================================= */
function SetCard({ s, idx, total, onUpdate, onRemove }) {
  const [open, setOpen] = useState(true);
  const hours   = Math.round(calcHours(s.start, s.end) * 10) / 10;
  const setTot  = n(s.d_price) + n(s.u_price) + n(s.m_price) + n(s.quest);
  const setCnt  = n(s.d_count) + n(s.u_count) + n(s.m_count);

  const upd = (key, val) => onUpdate(idx, key, val);

  return (
    <div className="set-card fade-in">
      <div className="set-header" onClick={() => setOpen(o => !o)}>
        <div className="set-badge">{idx + 1}</div>
        <div className="set-header-info">
          <div className="set-header-title">
            第{idx+1}セット &nbsp;{s.start} → {s.end}&nbsp; ({hours}h)
          </div>
          <div className="set-header-sub">
            {setCnt}件 &nbsp;/&nbsp; ¥{setTot.toLocaleString()}
          </div>
        </div>
        <div className="set-header-right">
          {total > 1 && (
            <button className="del-btn" onClick={e => { e.stopPropagation(); onRemove(idx); }}>削除</button>
          )}
          <span className="chevron">{open ? '▲' : '▼'}</span>
        </div>
      </div>

      {open && (
        <div className="set-body slide-down">
          {/* 時間 */}
          <div className="grid-2 mt14">
            <div>
              <label className="field-label">開始時刻</label>
              <input type="time" className="full-input" value={s.start}
                onChange={e => upd('start', e.target.value)} />
            </div>
            <div>
              <label className="field-label">終了時刻</label>
              <input type="time" className="full-input" value={s.end}
                onChange={e => upd('end', e.target.value)} />
            </div>
          </div>

          {/* 各プラットフォーム */}
          {PLATFORMS.map(p => (
            <div key={p.key} className="platform-block"
              style={{ background: p.color+'12', border: `1.5px solid ${p.color}28` }}>
              <div className="platform-block-label" style={{ color: p.color }}>{p.label}</div>
              <div className="grid-2">
                <div>
                  <label className="field-label">売上（円）</label>
                  <input type="number" inputMode="numeric" className="full-input"
                    placeholder="0" value={s[`${p.key}_price`]}
                    onChange={e => upd(`${p.key}_price`, e.target.value)} />
                </div>
                <div>
                  <label className="field-label">件数</label>
                  <input type="number" inputMode="numeric" className="full-input"
                    placeholder="0" value={s[`${p.key}_count`]}
                    onChange={e => upd(`${p.key}_count`, e.target.value)} />
                </div>
              </div>
            </div>
          ))}

          {/* クエスト・走行距離 */}
          <div className="grid-2 mt10">
            <div>
              <label className="field-label" style={{ color: '#ffd600' }}>⚡ クエスト（円）</label>
              <input type="number" inputMode="numeric" className="full-input"
                placeholder="0" value={s.quest}
                onChange={e => upd('quest', e.target.value)} />
            </div>
            <div>
              <label className="field-label">🛵 走行距離（km）</label>
              <input type="number" inputMode="decimal" className="full-input"
                placeholder="0.0" value={s.km}
                onChange={e => upd('km', e.target.value)} />
            </div>
          </div>

          {/* 戦術メモ */}
          <div className="mt10">
            <label className="field-label">📝 戦術メモ</label>
            <textarea className="full-input" rows={2}
              placeholder="エリア・戦術・気づき..."
              value={s.memo} onChange={e => upd('memo', e.target.value)} />
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   メインアプリ
========================================================= */
function App() {
  const [date, setDate]     = useState(getDefaultDate);
  const [weather, setWeather] = useState('晴');
  const [isQuest, setIsQuest] = useState(false);
  const [sets, setSets]     = useState([newSet()]);
  const [showLog, setShowLog] = useState(false);
  const [copied, setCopied] = useState(false);

  /* セット操作 */
  const updateSet = useCallback((i, key, val) => {
    setSets(prev => prev.map((s, idx) => idx === i ? { ...s, [key]: val } : s));
  }, []);
  const addSet    = () => setSets(prev => [...prev, newSet()]);
  const removeSet = i  => setSets(prev => prev.filter((_, idx) => idx !== i));

  /* サマリー計算 */
  const totals = useMemo(() => sets.reduce((acc, s) => ({
    d_p: acc.d_p + n(s.d_price), d_c: acc.d_c + n(s.d_count),
    u_p: acc.u_p + n(s.u_price), u_c: acc.u_c + n(s.u_count),
    m_p: acc.m_p + n(s.m_price), m_c: acc.m_c + n(s.m_count),
    quest: acc.quest + n(s.quest),
    km:    acc.km    + n(s.km),
    hours: acc.hours + calcHours(s.start, s.end),
  }), { d_p:0, d_c:0, u_p:0, u_c:0, m_p:0, m_c:0, quest:0, km:0, hours:0 }), [sets]);

  const totalPrice = totals.d_p + totals.u_p + totals.m_p + totals.quest;
  const totalCount = totals.d_c + totals.u_c + totals.m_c;
  const hourly     = totals.hours > 0 ? Math.round(totalPrice / totals.hours) : 0;

  /* ログ */
  const logText = useMemo(() => generateLog({ date, weather, isQuest, sets }), [date, weather, isQuest, sets]);

  const handleCopy = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(logText).then(() => {
        setCopied(true); setTimeout(() => setCopied(false), 2200);
      });
    } else {
      // フォールバック（古い Safari 等）
      const ta = document.createElement('textarea');
      ta.value = logText; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 2200);
    }
  };

  return (
    <>
      {/* ========= ヘッダー ========= */}
      <div className="header">
        <div className="header-logo">🛡️</div>
        <div>
          <div className="header-title">DELIVERY VIBE</div>
          <div className="header-sub">BOSS稼働ログ · V5フォーマット</div>
        </div>
      </div>

      {/* ========= 日付・環境 ========= */}
      <div className="section mt8">
        <div className="section-label">稼働情報</div>
        <div className="env-row">
          <div>
            <label className="field-label">稼働日</label>
            <input type="date" className="full-input" value={date}
              onChange={e => setDate(e.target.value)} />
          </div>
          <div>
            <label className="field-label">天気</label>
            <div className="weather-btns">
              {WEATHER_LIST.map(w => (
                <button key={w.label}
                  className={`weather-btn ${weather === w.label ? 'active' : ''}`}
                  onClick={() => setWeather(w.label)}>
                  {w.icon}
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="mt8">
          <button className={`quest-btn ${isQuest ? 'active' : ''}`}
            onClick={() => setIsQuest(q => !q)}>
            <span>{isQuest ? '⚡' : '　'}</span>
            <span>{isQuest ? 'クエストあり' : 'クエストなし（タップで切替）'}</span>
          </button>
        </div>
      </div>

      {/* ========= サマリー ========= */}
      <div className="section mt20">
        <div className="section-label">本日サマリー（リアルタイム）</div>
        <div className="summary-grid">
          <div className="stat-card" style={{ borderColor:'rgba(255,92,26,0.3)' }}>
            <div className="stat-card-label">総売上</div>
            <div className="stat-card-value" style={{ color:'#ff5c1a' }}>¥{totalPrice.toLocaleString()}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card-label">件数</div>
            <div className="stat-card-value">{totalCount}<span style={{fontSize:13}}>件</span></div>
            <div className="stat-card-sub">{Math.round(totals.hours*100)/100}h稼働</div>
          </div>
          <div className="stat-card" style={{ borderColor:'rgba(0,230,118,0.25)' }}>
            <div className="stat-card-label">時給換算</div>
            <div className="stat-card-value" style={{ color:'#00e676' }}>¥{hourly.toLocaleString()}</div>
          </div>
        </div>
        <div className="platform-grid">
          {[
            { label:'出前館', color:'#ff5c1a', price: totals.d_p, count: totals.d_c },
            { label:'Uber',   color:'#06C167', price: totals.u_p, count: totals.u_c },
            { label:'menu',   color:'#e91e8c', price: totals.m_p, count: totals.m_c },
          ].map(p => (
            <div key={p.label} className="platform-card"
              style={{ background: p.color+'10', border:`1.5px solid ${p.color}28` }}>
              <div className="platform-card-label" style={{ color: p.color }}>{p.label}</div>
              <div className="platform-card-price">¥{p.price.toLocaleString()}</div>
              <div className="platform-card-count">{p.count}件</div>
            </div>
          ))}
        </div>
      </div>

      {/* ========= セット一覧 ========= */}
      <div className="section mt20">
        <div className="section-label">セット詳細入力</div>
        {sets.map((s, i) => (
          <SetCard key={i} s={s} idx={i} total={sets.length}
            onUpdate={updateSet} onRemove={removeSet} />
        ))}
        <button className="add-set-btn mt8" onClick={addSet}>
          ＋　新しいセットを追加
        </button>
      </div>

      {/* ========= ログ生成 ========= */}
      <div className="section mt20">
        <button className={`gen-btn ${showLog ? 'open' : ''}`}
          onClick={() => setShowLog(v => !v)}>
          📊 {showLog ? 'ログを閉じる' : 'マニュアルV5形式でログ生成'}
        </button>

        {showLog && (
          <div className="log-box fade-in">
            <div className="log-topbar">
              <span className="log-topbar-label">コピーしてDiscord等に貼り付け</span>
              <button className={`copy-btn ${copied ? 'copied' : ''}`} onClick={handleCopy}>
                {copied ? '✓ コピー済' : 'コピー'}
              </button>
            </div>
            <pre className="log-pre">{logText}</pre>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
